global:
  scrape_interval: 5s # Hoe vaak metrics worden opgehaald (lekker snel voor testen)

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'target-service'
    static_configs:
      - targets: ['target-service:3003'] # Docker service naam + poort

  - job_name: 'score-service'
    static_configs:
      - targets: ['score-service:3006'] # Docker service naam + poort